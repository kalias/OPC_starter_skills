<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPC Starter Skills — 一人公司起步技能集</title>
  <meta name="description" content="一套为 AI 时代独立开发者 / 一人公司准备的 Claude Code 技能集。Part 1 极简创业者（心态）+ Part 2 AI 一人公司（打法），共 17 个技能。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

  <!-- Docsify 主题：vue（清爽）+ dark 自动适配 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
    /* 封面 hero */
    .cover-main h1 { font-size: 2.6rem !important; letter-spacing: 1px; }
    .cover-main blockquote { font-size: 1.05rem !important; }
    /* 表格更紧凑 */
    .markdown-section table { display: table; width: 100%; }
    /* 代码块圆角 */
    .markdown-section pre { border-radius: 8px; }
  </style>
</head>
<body>
  <div id="app">正在加载…</div>

  <script>
    window.$docsify = {
      name: 'OPC Starter Skills',
      repo: 'kalias/OPC_starter_skills',
      loadSidebar: true,           // 加载 _sidebar.md
      loadNavbar: false,
      coverpage: true,             // 加载 _coverpage.md
      subMaxLevel: 3,              // 侧边栏自动展开到 H3
      maxLevel: 3,                 // 页内目录到 H3
      search: {
        placeholder: '搜索技能…',
        noData: '没有结果',
        depth: 3,
        hideOtherSidebarContent: false,
      },
      auto2top: true,              // 切页自动回顶
      relativePath: true,          // 相对路径，方便点进 skills/ 子目录
      copyCode: { buttonText: '复制' },
      themeColor: '#42b983',
      footer: {
        copy: '<span>© 2026 OPC Starter Skills</span>',
        pre: '<br/>',
        auth: '本地化内容 MIT · 原作者内容版权归原作者',
      },
    };
  </script>

  <!-- Docsify 核心 + 插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

  <!-- 暗色主题切换：自动跟随系统 -->
  <script>
    (function () {
      const mql = window.matchMedia('(prefers-color-scheme: dark)');
      const setTheme = (dark) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = dark
          ? '//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css'
          : '//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css';
        // 替换已加载的主题样式表（第一个 theme stylesheet）
        const existing = document.querySelectorAll('link[href*="themes/"]');
        if (existing.length) existing[existing.length - 1].replaceWith(link);
        else document.head.appendChild(link);
      };
      setTheme(mql.matches);
      mql.addEventListener('change', (e) => setTheme(e.matches));
    })();
  </script>
</body>
</html>
